services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.8
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  console:
    image: docker.redpanda.com/redpandadata/console:v2.4.5
    container_name: redpanda-console
    ports:
      - "8081:8080"
    environment:
      - KAFKA_BROKERS=redpanda:29092
    depends_on:
      - redpanda

  init-kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.8
    container_name: init-kafka
    depends_on:
      - redpanda
    entrypoint: [ "sh", "-c", "sleep 5 && rpk topic create bid-requests impressions --brokers redpanda:29092" ]

  redis:
    image: redis:7-alpine
    container_name: infra_redis
    ports:
      - "6379:6379"
    volumes:
      - infra_redis-data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_DB=bidsrv
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./internal/storage/clickhouse/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  init-clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: init-clickhouse
    depends_on:
      - clickhouse
    entrypoint: [ "sh", "-c", "sleep 10 && clickhouse-client --host clickhouse --query 'CREATE DATABASE IF NOT EXISTS bidsrv'" ]
    volumes:
      - ./internal/storage/clickhouse/schema.sql:/schema.sql

  api:
    build: .
    container_name: bidsrv
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=infra_redis:6379
      - KAFKA_BROKERS=redpanda:29092
      - CLICKHOUSE_ADDR=clickhouse:9000
      - PORT=8080
      - BASE_URL=http://localhost:8080
    depends_on:
      - init-kafka
      - redis
      - clickhouse

volumes:
  redpanda-data:
  redis-data:
  clickhouse-data: